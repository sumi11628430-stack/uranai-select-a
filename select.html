<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />

<body>

  <!-- 背景 -->
  <div class="bg-gradient"></div>

  </video>
  -->
  <canvas class="bg-canvas"></canvas>
  <div class="bg-vignette"></div>

  <!-- 本文 -->
  <main class="page">

    <p class="select-lead">今日、あなたが知りたいことは？</p>

    <div class="select-grid">

      <!-- ① 誕生石占い（現在ご用意している占い） -->

        <span class="card-title">あなたの誕生石は？</span>

      <!-- ② これから増やす枠（見た目のヒント。不要なら削除OK） -->

        <span class="card-icon">🔮</span>
        <span class="card-title">近日公開</span>
        <span class="card-note">占いメニューを準備中…</span>
      </div>

    </div>

    <a class="back-link" href="index.html" data-transition>← 入口へ戻る</a>

  <p class="site-foot">© 占いの館</p>
